# ---------- 8. 特殊交易规则 ----------

# 个人转账不计收入（对方名包含以下关键词的收入，不计入实际收入）
# 请按需修改为实际需要过滤的联系人
personal_transfer_ignore:
  - 示例联系人A
  - 示例联系人B

# 房租代缴规则（对方名包含此关键词，且金额>=threshold的，不计收支）
# 请按需修改
rent_collection:
  keywords:
    - 房东
    - 房租
  amount_threshold: 2000

# 押金规则（商品说明含以下关键词的支出，不计入实际支出）
deposit_keywords:
  - 押金
  - 保证金
  - 定金

# 出差酒店名单（公司报销，标记 business_trip=true，不计入实际支出）
# 请按需修改
business_trip_hotels:
  - 示例酒店

# 退款关键词
refund_keywords:
  - 退款
  - 退票
  - 退货
  - 取消

# ---------- 9. 银行卡解析规则（来自 parse_bank.py） ----------
bank_rules:
  # 不计收入的对方户名（请按需修改）
  ignore_names:
    - 示例联系人A
    - 示例联系人B
  # 不计收入的交易名称关键词
  skip_types:
    - 网上快捷提现
    - 银证转账
    - 退款
  # 银联入账中过滤的附言关键词
  skip_memo:
    - 零钱通提现
    - 微信零钱提现
    - 支付宝余额提现
  # PDF页眉页脚过滤关键词
  header_keywords:
    - 温馨提示
    - END
    - 页数
    - 交易流水
    - 交易区间
    - 客户姓名
    - 借记卡号
    - 借方发生数
    - 贷方发生数
    - 账号
    - 收支筛选
    - 币种筛选
    - 打印时间
    - 记账日期
    - 记账时间
    - 币别
    - 余额
    - 交易名称
    - 渠道
    - 网点名称
    - 附言
    - 对方账户名
    - 对方卡号
    - 对方开户行

# ---------- 10. 数据源配置 ----------
# 请按实际文件修改
data_sources:
  project_root: "E:\\moneycounter_single"
  data_dir: "data"
  tables_dir: "data/tables"
  pdfs_dir: "data/pdf"
  output_dir: "data"
  supported_formats:
    - ".csv"
    - ".xlsx"
    - ".xls"
    - ".pdf"
  files:
    wechat_pattern: "*微信*"
    alipay_pattern: "*支付宝*"
    # 银行卡配置示例（请按实际文件修改）
    bank_configs: []

# ---------- 11. 输出字段定义 ----------
output_fields:
  - transaction_time
  - transaction_type
  - counterparty
  - product_desc
  - income_expense_type
  - amount
  - payment_method
  - transaction_status
  - transaction_id
  - source_system
  - business_trip
